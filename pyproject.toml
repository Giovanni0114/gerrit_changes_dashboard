[project]
name = "gerrit-approvals-dashboard"
version = "0.1.0"
dependencies = [
    "rich",
]
readme = "README.rst"
license = "MIT"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes (essential)
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear (common bugs)
    "RUF"  # Ruff-specific rules
]
